<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Department Employee</title>
</head>
<body>
    <a href="/employees/add">Thêm</a>
    <div>
        <form method="get" th:action="@{/employees}">
            <input type="text" name="search" th:value="${search}" placeholder="Tìm theo tên nhân viên...">
            <input type="hidden" name="sort" th:value="${sort}">
            <input type="hidden" name="direction" th:value="${direction}">
            <input type="hidden" name="size" th:value="${size}">
            <button type="submit">Tìm kiếm</button>
            <a th:href="@{/employees(sort=${sort}, direction=${direction}, size=${size})}">Xóa tìm kiếm</a>
        </form>
    </div>
    <div>
        <span>Sắp xếp theo: </span>
        <a th:href="@{/employees(search=${search}, sort='name', direction=${sort == 'name' and direction == 'asc' ? 'desc' : 'asc'}, size=${size})}" 
           class="sort-link">
            Tên 
            <span th:if="${sort == 'name'}">
                <span th:if="${direction == 'asc'}">↑</span>
                <span th:if="${direction == 'desc'}">↓</span>
            </span>
        </a>
        |
        <a th:href="@{/employees(search=${search}, sort='age', direction=${sort == 'age' and direction == 'asc' ? 'desc' : 'asc'}, size=${size})}">
            Tuổi 
            <span th:if="${sort == 'age'}">
                <span th:if="${direction == 'asc'}">↑</span>
                <span th:if="${direction == 'desc'}">↓</span>
            </span>
        </a>
    </div>
    <table border="1" th:if="${!employees.empty}">
        <thead>
        <tr>
            <th>ID</th>
            <th>Avatar</th>
            <th>Tên</th>
            <th>Tuổi</th>
            <th>Trạng thái</th>
            <th>Phòng ban</th>
            <th>Hành động</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="employee : ${employees}">
            <td th:text="${employee.id}"></td>
            <td>
                <img th:if="${employee.avatar != null and !employee.avatar.isEmpty()}" 
                     th:src="@{'/uploads/avatars/' + ${employee.avatar}}" 
                     alt="Avatar" 
                     class="avatar" />
                <img th:unless="${employee.avatar != null and !employee.avatar.isEmpty()}" 
                     src="https://via.placeholder.com/50" 
                     alt="Default Avatar" 
                     class="avatar" />
            </td>
            <td th:text="${employee.name}"></td>
            <td th:text="${employee.age}"></td>
            <td th:text="${employee.status}"></td>
            <td th:text="${employee.department != null ? employee.department.name : 'N/A'}"></td>
            <td>
                <a th:href="@{/employees/{id}/edit(id=${employee.id})}">Sửa</a>
                <a th:href="@{/employees/{id}/delete(id=${employee.id})}">Xóa</a>
            </td>
        </tr>
        </tbody>
    </table>
    <div th:if="${employees.empty}">
        <p>Không tìm thấy nhân viên nào</p>
    </div>
    <div th:if="${totalPages > 0}">
        <a th:if="${currentPage > 0}" 
           th:href="@{/employees(page=${currentPage - 1}, search=${search}, sort=${sort}, direction=${direction}, size=${size})}">
        </a>
        <span th:if="${currentPage == 0}" ></span>
        <span th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
            <span th:if="${i == currentPage}" th:text="${i + 1}">1</span>
            <a th:if="${i != currentPage}" 
               th:href="@{/employees(page=${i}, search=${search}, sort=${sort}, direction=${direction}, size=${size})}"
               th:text="${i + 1}">1</a>
        </span>
        <a th:if="${currentPage < totalPages - 1}" 
           th:href="@{/employees(page=${currentPage + 1}, search=${search}, sort=${sort}, direction=${direction}, size=${size})}">
            Trang sau &raquo;
        </a>
        <span th:if="${currentPage == totalPages - 1}" >Trang sau &raquo;</span>
    </div>
    <div th:if="${totalItems > 0}">
        <p>Hiển thị <span th:text="${employees.size()}">0</span> 
           trong tổng số <span th:text="${totalItems}">0</span> nhân viên
           (Trang <span th:text="${currentPage + 1}">1</span>/<span th:text="${totalPages}">1</span>)</p>
    </div>
</body>
</html>
