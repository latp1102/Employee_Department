<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<table class="table" border="1">
    <thead>
    <tr>
        <th>ID</th>
        <th>Name</th>
        <th>Status</th>
        <th>Department</th>
        <th>Action</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="employee : ${employees}">
        <td scope="row" th:text="${employee.id}"></td>
        <td th:text="${employee.name}"></td>
        <td th:text="${employee.status}"></td>
        <td th:text="${employee.department.name}"></td>
        <td>
            <a th:href="@{/employees/{id}/edit(id=${employee.id})}">Edit</a>
            <a th:href="@{/employees/{id}/delete(id=${employee.id})}">Delete</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
